services:

  web:
    build: .
    container_name: barbearia_web

    ports:
      - "5000:5000"

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: barbearia_mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql

volumes:
  mysql_data: